<!DOCTYPE html>
<html lang="ko" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가격비교 시스템</title>
  <meta name="description" content="B2B 제품 가격비교 및 견적 관리 시스템">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { 50: '#f8fafc', 100: '#e2e8f0', 200: '#cbd5e1', 300: '#94a3b8', 400: '#64748b', 500: '#475569', 600: '#334155', 700: '#1e293b', 800: '#0f172a', 900: '#020617' },
            accent: { DEFAULT: '#6366f1', hover: '#818cf8', light: '#a5b4fc', dim: '#4338ca' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-track {
      background: #1e293b
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto
    }

    .modal-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 700px;
      max-height: 85vh;
      overflow-y: auto;
      transform: scale(.95);
      transition: transform .2s
    }

    .modal-overlay.active .modal-box {
      transform: scale(1)
    }

    .modal-box.wide {
      max-width: 900px
    }

    .tab-btn {
      transition: all .15s
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #6366f1, #4338ca);
      color: #fff;
      box-shadow: 0 2px 8px rgba(99, 102, 241, .35)
    }

    .sub-tab-btn {
      transition: all .15s;
      border-bottom: 2px solid transparent
    }

    .sub-tab-btn.active {
      border-bottom-color: #6366f1;
      color: #a5b4fc
    }

    .fade-in {
      animation: fadeIn .25s ease-out
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    input,
    select,
    textarea {
      transition: border-color .15s
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #6366f1 !important;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, .25)
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4338ca);
      transition: all .15s
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #818cf8, #6366f1);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, .4)
    }

    .btn-danger {
      background: #dc2626;
      transition: all .15s
    }

    .btn-danger:hover {
      background: #ef4444;
      transform: translateY(-1px)
    }

    .btn-secondary {
      background: #334155;
      transition: all .15s
    }

    .btn-secondary:hover {
      background: #475569
    }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      transition: all .15s
    }

    .btn-success:hover {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      transform: translateY(-1px)
    }

    .card {
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      transition: all .15s;
      cursor: pointer
    }

    .card:hover {
      border-color: #6366f1;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, .15)
    }

    .card.selected {
      border-color: #6366f1;
      background: #1e293b
    }

    .price-highlight {
      background: linear-gradient(135deg, rgba(99, 102, 241, .1), rgba(99, 102, 241, .05));
      border: 1px solid rgba(99, 102, 241, .2)
    }

    .drag-handle {
      cursor: grab;
      user-select: none
    }

    .drag-handle:active {
      cursor: grabbing
    }

    .preview-table {
      width: 100%;
      border-collapse: collapse
    }

    .preview-table th,
    .preview-table td {
      border: 1px solid #334155;
      padding: 6px 10px;
      text-align: left;
      font-size: 13px
    }

    .preview-table th {
      background: #334155;
      font-weight: 600
    }

    .preview-table tr:hover {
      background: rgba(99, 102, 241, .05)
    }

    @media(max-width:768px) {
      .modal-box {
        width: 95%;
        padding: 16px;
        max-height: 90vh
      }
    }
  </style>
</head>

<body class="bg-dark-800 text-dark-100">

  <!-- Login Screen -->
  <div id="loginScreen" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="login-card"
      style="background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 32px; width: 100%; max-width: 400px;">
      <div class="text-center mb-6">
        <div
          class="w-14 h-14 rounded-2xl bg-gradient-to-br from-accent to-accent-dim flex items-center justify-center mx-auto mb-3">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
        </div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-accent-light to-accent bg-clip-text text-transparent">가격비교
          시스템</h1>
        <p class="text-dark-400 text-sm mt-1">로그인하여 시작하세요</p>
      </div>
      <div class="space-y-3">
        <div><label class="text-sm text-dark-300 block mb-1">이메일</label><input id="loginEmail" type="email"
            placeholder="email@example.com"
            style="width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; color: #e2e8f0;">
        </div>
        <div><label class="text-sm text-dark-300 block mb-1">비밀번호</label><input id="loginPassword" type="password"
            placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"
            style="width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; color: #e2e8f0;">
        </div>
        <div id="loginError" class="text-red-400 text-xs" style="display:none"></div>
        <button onclick="doLogin()" id="loginBtn"
          class="btn-primary w-full py-2 rounded-lg font-medium text-sm">로그인</button>
      </div>
    </div>
  </div>

  <!-- App Screen -->
  <div id="appWrapper" style="display: none;">

    <!-- Header -->
    <header class="bg-dark-900/80 backdrop-blur-md border-b border-dark-600 sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div
            class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-accent-dim flex items-center justify-center flex-shrink-0">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
            </svg>
          </div>
          <h1
            class="text-lg font-bold bg-gradient-to-r from-accent-light to-accent bg-clip-text text-transparent whitespace-nowrap">
            가격비교</h1>
          <span id="headerUsername"
            class="text-xs font-medium text-dark-300 bg-dark-700/50 px-2 py-0.5 rounded-md hidden ml-1"></span>
        </div>
        <div class="flex items-center gap-1.5 md:gap-2 flex-wrap justify-end">
          <button id="btnUserManage" onclick="openUserManageModal()"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium hidden">👥 유저 관리</button>
          <button id="btnDeleteLogs" onclick="openDeleteLogsModal()"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium hidden">🗑️ 삭제 이력</button>
          <div class="w-px h-6 bg-dark-600 mx-0.5 hidden md:block" id="adminDivider" style="display:none"></div>
          <button onclick="openSearchModal()"
            class="bg-accent/80 hover:bg-accent text-white text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium transition-colors border border-accent/40 shadow-sm shadow-accent/20">🔍
            검색</button>
          <button onclick="openManageModal('category')"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium">⚙️ 카테고리</button>
          <button onclick="openManageModal('spec')"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium">📋 스펙</button>
          <button onclick="openManageModal('company')"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium">🏢 회사</button>
          <button onclick="openExchangeRateModal()"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium">💱 환율</button>
          <div class="w-px h-6 bg-dark-600 mx-0.5 hidden md:block"></div>
          <button onclick="openExcelUploadModal()"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium">📤 엑셀 업로드</button>
          <button onclick="openCategoryExportModal()"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium">📥 내보내기</button>
          <button onclick="exportJSON()"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium">💾 백업</button>
          <button onclick="document.getElementById('importJSON').click()"
            class="btn-secondary text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium">📂 복원</button>
          <input type="file" id="importJSON" accept=".json" class="hidden" onchange="importJSON(event)">
          <button onclick="doLogout()"
            class="text-xs md:text-sm px-2 md:px-3 py-1.5 rounded-lg font-medium bg-red-900/50 hover:bg-red-800 text-red-300 ml-2 border border-red-800 transition-colors">🚪
            로그아웃</button>
        </div>
      </div>
    </header>

    <!-- Category Tabs -->
    <nav id="categoryTabs" class="bg-dark-900/50 border-b border-dark-600">
      <div class="max-w-7xl mx-auto px-4 py-2 flex gap-2 overflow-x-auto"></div>
    </nav>

    <!-- Sub Tabs -->
    <nav id="subTabs" class="bg-dark-800 border-b border-dark-700">
      <div class="max-w-7xl mx-auto px-4 py-0 flex gap-4">
        <button class="sub-tab-btn py-2 px-1 text-sm font-medium text-dark-300" onclick="switchSubTab('company')"
          data-subtab="company">🏢 회사별</button>
        <button class="sub-tab-btn py-2 px-1 text-sm font-medium text-dark-300" onclick="switchSubTab('compare')"
          data-subtab="compare">📊 스펙 비교</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-4 md:py-6">
      <!-- Company Tab Content -->
      <div id="companyTabContent">
        <div class="flex gap-6" id="mainLayout">
          <div class="w-full lg:w-1/4" id="companyListPanel">
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-base font-semibold" id="companyListTitle">회사 목록</h2>
            </div>
            <div id="companyList" class="space-y-1.5" style="max-height:60vh;overflow-y:auto"></div>
            <div id="emptyCompanyMsg" class="text-center py-12 text-dark-400 hidden">
              <div class="text-3xl mb-2">🏢</div>
              <p class="text-sm">등록된 회사가 없습니다</p>
            </div>
          </div>
          <div class="w-full lg:w-1/4" id="productListPanel">
            <div class="flex items-center justify-between mb-3">
              <h2 class="text-base font-semibold" id="productListTitle">제품 목록</h2>
              <div class="flex items-center gap-1.5">
                <button onclick="toggleCompanySpecPanel()" id="companySpecToggleBtn"
                  class="text-xs px-2 py-1.5 rounded-lg font-medium transition-all bg-dark-600 text-dark-300 hover:bg-dark-500 hidden"
                  title="스펙 표시 설정">⚙️</button>
                <button onclick="openProductModal()" class="btn-primary text-xs px-2.5 py-1.5 rounded-lg font-medium">+
                  제품</button>
              </div>
            </div>
            <div id="companySpecPanel"
              class="mb-3 p-2.5 bg-dark-700/60 border border-dark-600 rounded-lg flex flex-wrap gap-2 hidden fade-in">
            </div>
            <div id="productList" class="space-y-1.5" style="max-height:60vh;overflow-y:auto"></div>
            <div id="emptyProductMsg" class="text-center py-12 text-dark-400 hidden">
              <div class="text-3xl mb-2">📦</div>
              <p class="text-sm">회사를 선택하세요</p>
            </div>
          </div>
          <div class="hidden lg:block w-full lg:w-1/2" id="detailPanel">
            <div id="productDetail" class="fade-in"></div>
            <div id="emptyDetailMsg" class="text-center py-20 text-dark-400">
              <div class="text-4xl mb-3">👈</div>
              <p>제품을 선택하세요</p>
              <p class="text-sm mt-1">스펙 및 가격 정보가 표시됩니다</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Compare Tab Content -->
      <div id="compareTabContent" class="hidden">
        <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
          <div class="flex items-center gap-3">
            <h2 class="text-base font-semibold">📊 스펙 비교</h2>
            <select id="compareDisplayCurrency" onchange="setQuoteDisplayCurrency(this.value)"
              class="bg-dark-700 border border-dark-600 rounded-lg px-2 py-1 text-xs font-medium">
              <option value="KRW">KRW (원)</option>
              <option value="USD">USD ($)</option>
              <option value="CNY">CNY (¥)</option>
            </select>
            <button onclick="toggleCompareSpecPanel()" id="compareSpecToggleBtn"
              class="text-xs px-2 py-1 rounded-lg font-medium transition-all bg-dark-600 text-dark-300 hover:bg-dark-500">⚙️
              표시 스펙 설정 ▼</button>
          </div>
          <button onclick="openCompareExcelPreview()" class="btn-primary text-xs px-3 py-1.5 rounded-lg font-medium">📥
            비교 엑셀 내보내기</button>
        </div>
        <div id="compareSpecPanel"
          class="mb-4 p-2.5 bg-dark-700/60 border border-dark-600 rounded-lg flex flex-wrap gap-2 hidden fade-in"></div>
        <div id="compareCheckboxes" class="mb-4 flex flex-wrap gap-2"></div>
        <div id="compareTableWrap" class="overflow-x-auto"></div>
      </div>

      <!-- Quote Builder Section -->
      <div class="mt-6 border-t border-dark-600 pt-4" id="quoteSection">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 mb-4">
          <div class="flex items-center gap-3">
            <h2 class="text-base font-semibold">📑 최종 견적</h2>
            <select id="quoteDisplayCurrency" onchange="setQuoteDisplayCurrency(this.value)"
              class="bg-dark-700 border border-dark-600 rounded-lg px-2 py-1 text-xs font-medium">
              <option value="KRW">KRW (원)</option>
              <option value="USD">USD ($)</option>
              <option value="CNY">CNY (¥)</option>
            </select>
          </div>
          <button onclick="openQuoteExcelPreview()" class="btn-primary text-xs px-3 py-2 rounded-lg font-medium">📊 견적
            엑셀
            내보내기</button>
        </div>
        <div id="quoteBuilder" class="space-y-4"></div>
        <div id="quoteTotals"></div>
      </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-[999] hidden">
      <div class="bg-accent rounded-lg px-4 py-2 text-white text-sm font-medium shadow-lg shadow-accent/30 fade-in">
      </div>
    </div>

    <!-- MODALS will be generated dynamically -->
    <div id="modalContainer"></div>
  </div> <!-- End appWrapper -->

  <script>
    /* ===================== DATA ===================== */
    const DEFAULT_CATEGORIES = ['Module', 'SMPS', 'Cable', 'Cabinet', 'Receiver Card'];
    const DEFAULT_SPECS = {
      'Module': [{ name: '픽셀 피치', type: 'text' }, { name: '밝기(nit)', type: 'number' }, { name: '해상도', type: 'text' }, { name: '모듈 크기', type: 'text' }, { name: '구동방식', type: 'text' }, { name: 'CHIP', type: 'text' }, { name: 'IC', type: 'text' }, { name: 'PCB', type: 'text' }, { name: 'SCAN', type: 'text' }, { name: 'A/S', type: 'text' }],
      'SMPS': [{ name: '입력전압', type: 'text' }, { name: '출력전압', type: 'text' }, { name: '출력전류', type: 'text' }, { name: '용량(W)', type: 'number' }, { name: '싸이즈', type: 'text' }, { name: '버전', type: 'text' }],
      'Cable': [{ name: '케이블 종류', type: 'text' }, { name: '길이', type: 'text' }, { name: '커넥터 타입', type: 'text' }],
      'Cabinet': [{ name: '캐비닛 크기', type: 'text' }, { name: '무게', type: 'text' }, { name: '소재', type: 'text' }, { name: 'IP등급', type: 'text' }],
      'Receiver Card': []
    };

    let data = { categories: [], specs: {}, companies: {}, products: [], quoteSelections: {} };
    let currentCategory = '';
    let currentSubTab = 'company';
    let selectedCompanyId = null;
    let selectedProductId = null;
    let currentUserProfile = { nickname: null, is_admin: false };
    let currentUserEmail = '';

    function uid() { return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8) }
    function getCompany(id) { for (const cat of Object.keys(data.companies)) { const c = (data.companies[cat] || []).find(x => x.id === id); if (c) return c } return null }
    function getUserDisplayName() {
      const emailPrefix = currentUserEmail.split('@')[0];
      if (currentUserProfile.nickname) return `${currentUserProfile.nickname}(${emailPrefix})`;
      return emailPrefix;
    }
    function getCatCompanies(cat) { return data.companies[cat] || [] }
    function save() {
      if (window.syncTimeout) clearTimeout(window.syncTimeout);
      window.syncTimeout = setTimeout(async () => {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) return;
        await sb.from('shared_data').upsert(
          { id: 'shared', payload: data, updated_at: new Date().toISOString() },
          { onConflict: 'id' }
        );
      }, 500);
    }

    /* ===================== SUPABASE SQL =====================
    -- shared_data 테이블 (모든 인증 유저 공유)
    create table shared_data (
      id text primary key default 'shared',
      payload jsonb,
      updated_at timestamptz default now()
    );
    -- profiles 테이블
    create table profiles (
      id uuid references auth.users(id) on delete cascade primary key,
      nickname text,
      is_admin boolean default false,
      created_at timestamptz default now()
    );
    -- delete_logs 테이블
    create table delete_logs (
      id uuid default gen_random_uuid() primary key,
      item_type text,
      item_name text,
      deleted_by text,
      deleted_at timestamptz default now()
    );
    ========================================================== */

    /* ===================== SUPABASE INIT & AUTH ===================== */
    const SUPABASE_URL = 'https://wcmybffcvwayaindgkua.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjbXliZmZjdndheWFpbmRna3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTAyMzUsImV4cCI6MjA4OTg4NjIzNX0.aHG18mgMwd4eeS0bnHVdq3WCXFcB1KStyRv2qtMEWyI';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      errEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = '이메일/비밀번호 입력'; errEl.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = '로그인 중...';
      const { error } = await sb.auth.signInWithPassword({ email, password });
      btn.disabled = false; btn.textContent = '로그인';

    function showToast(msg) { const t = document.getElementById('toast'); t.querySelector('div').textContent = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 2000) }
    function openModal(id) { document.getElementById(id).classList.add('active') }
    function closeModal(id) { document.getElementById(id).classList.remove('active') }
    function formatPrice(price, currency) {
      const num = parseFloat(price); if (isNaN(num)) return price;
      if (currency === 'KRW') return num.toLocaleString('ko-KR') + '원';
      if (currency === 'USD') return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (currency === 'CNY') return '¥' + num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return num.toString();
    }
    function escQ(s) { return s.replace(/'/g, "\\'") }

    /* ===================== EXCHANGE RATE ===================== */
    let exchangeRates = { usdKrw: 1350, cnyKrw: 185, usdCny: 7.3 };
    let quoteDisplayCurrency = 'KRW';
    let quoteQuantities = {}; // {prodId: number}

    function loadExchangeRates() {
      try { const raw = localStorage.getItem('exchangeRates'); if (raw) exchangeRates = JSON.parse(raw) } catch (e) { }
      try { const cur = localStorage.getItem('quoteDisplayCurrency'); if (cur) quoteDisplayCurrency = cur } catch (e) { }
      try { const qty = localStorage.getItem('quoteQuantities'); if (qty) quoteQuantities = JSON.parse(qty) } catch (e) { }
    }
    function saveExchangeRates() {
      const u = parseFloat(document.getElementById('rateUsdKrw').value) || exchangeRates.usdKrw;
      const c = parseFloat(document.getElementById('rateCnyKrw').value) || exchangeRates.cnyKrw;
      const uc = parseFloat(document.getElementById('rateUsdCny').value) || exchangeRates.usdCny;
      exchangeRates = { usdKrw: u, cnyKrw: c, usdCny: uc };
      localStorage.setItem('exchangeRates', JSON.stringify(exchangeRates));
      closeModal('modalExchangeRate');
      showToast('환율 저장 완료');
      renderQuoteBuilder();
    }
    function openExchangeRateModal() {
      document.getElementById('rateUsdKrw').value = exchangeRates.usdKrw;
      document.getElementById('rateCnyKrw').value = exchangeRates.cnyKrw;
      document.getElementById('rateUsdCny').value = exchangeRates.usdCny;
      openModal('modalExchangeRate');
    }
    function convertToKRW(price, fromCurrency) {
      const num = parseFloat(price) || 0;
      if (fromCurrency === 'KRW') return num;
      if (fromCurrency === 'USD') return num * exchangeRates.usdKrw;
      if (fromCurrency === 'CNY') return num * exchangeRates.cnyKrw;
      return num;
    }
    function convertFromKRW(krwAmount, toCurrency) {
      if (toCurrency === 'KRW') return krwAmount;
      if (toCurrency === 'USD') return krwAmount / exchangeRates.usdKrw;
      if (toCurrency === 'CNY') return krwAmount / exchangeRates.cnyKrw;
      return krwAmount;
    }
    function convertPrice(price, fromCurrency, toCurrency) {
      if (fromCurrency === toCurrency) return parseFloat(price) || 0;
      const krw = convertToKRW(price, fromCurrency);
      return convertFromKRW(krw, toCurrency);
    }
    function formatConverted(price, fromCurrency) {
      const converted = convertPrice(price, fromCurrency, quoteDisplayCurrency);
      return formatPrice(converted, quoteDisplayCurrency);
    }
    function setQuoteDisplayCurrency(cur) {
      quoteDisplayCurrency = cur;
      localStorage.setItem('quoteDisplayCurrency', cur);
      const qSel = document.getElementById('quoteDisplayCurrency');
      if (qSel) qSel.value = cur;
      const cSel = document.getElementById('compareDisplayCurrency');
      if (cSel) cSel.value = cur;
      renderQuoteBuilder();
      if (currentSubTab === 'compare') renderCompareTab();
    }
    function setQuoteQuantity(prodId, qty) {
      quoteQuantities[prodId] = parseInt(qty) || 1;
      localStorage.setItem('quoteQuantities', JSON.stringify(quoteQuantities));
      renderQuoteBuilder();
    }

    function saveSpecEdit() { const cat = document.getElementById('editSpecCat').value; const idx = parseInt(document.getElementById('editSpecIdx').value); const name = document.getElementById('editSpecName').value.trim(); const type = document.getElementById('editSpecType').value; if (!name) { showToast('항목명을 입력하세요'); return } const oldName = data.specs[cat][idx].name; data.specs[cat][idx] = { name, type }; if (type === 'select') { const opts = document.getElementById('editSpecOptions').value.split(',').map(o => o.trim()).filter(Boolean); data.specs[cat][idx].options = opts } if (oldName !== name) { data.products.filter(p => p.category === cat).forEach(p => { if (p.specValues && p.specValues[oldName] !== undefined) { p.specValues[name] = p.specValues[oldName]; delete p.specValues[oldName] } }) } save(); closeModal('modalSpecEdit'); renderSpecManageList(); renderCompanyTab(); showToast('스펙 수정됨') }

    function addCompany() { const n = document.getElementById('newCompName').value.trim(); const c = document.getElementById('newCompCountry').value.trim(); const m = document.getElementById('newCompMemo').value.trim(); if (!n) { showToast('회사명을 입력하세요'); return } if (!data.companies[currentCategory]) data.companies[currentCategory] = []; data.companies[currentCategory].push({ id: uid(), name: n, country: c, memo: m }); document.getElementById('newCompName').value = ''; document.getElementById('newCompCountry').value = ''; document.getElementById('newCompMemo').value = ''; save(); renderCompanyManageList(); renderCompanyTab(); showToast('회사 추가됨') }

    let companySpecDisplay = {};

    /* ===================== COMPANY TAB VIEW ===================== */

    function selectCompany(cid) { selectedCompanyId = cid; selectedProductId = null; renderCompanyTab() }
    function renderProductListForCompany() {
      const list = document.getElementById('productList');
      const empty = document.getElementById('emptyProductMsg');
      const panel = document.getElementById('companySpecPanel');
      const btn = document.getElementById('companySpecToggleBtn');

      if (!selectedCompanyId) {
        list.innerHTML = ''; empty.classList.remove('hidden'); empty.querySelector('p').textContent = '회사를 선택하세요';
        if (panel) panel.classList.add('hidden');
        if (btn) btn.classList.add('hidden');
        return;
      }

      const comp = getCompany(selectedCompanyId);
      document.getElementById('productListTitle').textContent = (comp ? comp.name : '') + ' 제품';

      const catSpecs = data.specs[currentCategory] || [];
      if (btn && panel) {
        if (!catSpecs.length) {
          btn.classList.add('hidden');
          panel.classList.add('hidden');
        } else {
          btn.classList.remove('hidden');
          if (companySpecPanelOpen) {
            btn.classList.add('bg-accent', 'text-white');
            btn.classList.remove('bg-dark-600', 'text-dark-300');
            const selectedSpecs = getCompanySpecsForCat(currentCategory);
            panel.innerHTML = catSpecs.map(s => {
              const isChecked = selectedSpecs.includes(s.name);
              return `<label class="flex items-center gap-1 bg-dark-600 rounded px-2 py-1 text-xs cursor-pointer hover:bg-dark-500 transition-colors"><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCompanySpec('${escQ(currentCategory)}','${escQ(s.name)}',this.checked)" class="accent-indigo-500"><span>${s.name}</span></label>`;
            }).join('');
            panel.classList.remove('hidden');
          } else {
            btn.classList.remove('bg-accent', 'text-white');
            btn.classList.add('bg-dark-600', 'text-dark-300');
            panel.classList.add('hidden');
          }
        }
      }

      const products = data.products.filter(p => p.companyId === selectedCompanyId && p.category === currentCategory);
      if (!products.length) { list.innerHTML = ''; empty.classList.remove('hidden'); empty.querySelector('p').textContent = '등록된 제품이 없습니다'; return }
      empty.classList.add('hidden');

      const selectedSpecs = getCompanySpecsForCat(currentCategory);

      list.innerHTML = products.map(p => {
        const isSel = p.id === selectedProductId;
        const specParts = [];
        selectedSpecs.forEach(sn => {
          const val = p.specValues && p.specValues[sn];
          if (val) specParts.push(val);

    /* ===================== COMPARE TAB ===================== */

    /* ===================== QUOTE BUILDER ===================== */

    function renderQuoteBuilder() {
      // 표시 통화 드롭다운 동기화

      const catSubtotals = {};
      let grandTotal = 0;
      data.categories.forEach(cat => {
        const prods = data.products.filter(p => p.category === cat); if (!prods.length) return;
        if (!data.quoteSelections[cat]) data.quoteSelections[cat] = {};

    </div>`;

        if (panelOpen && catSpecs.length) {
          html += `<div class="mb-2 p-2.5 bg-dark-700/60 border border-dark-600 rounded-lg flex flex-wrap gap-2 fade-in">`;

          });
          html += `</div>`;

        html += `<div class="space-y-1.5">`;

          const unitPriceConverted = selectedProd ? convertPrice(selectedProd.price, selectedProd.currency, quoteDisplayCurrency) : 0;
          const subtotal = unitPriceConverted * qty;
          if (selectedProd) { catTotal += subtotal }

          html += `<div class="bg-dark-700 rounded-lg p-3 flex items-center gap-3 flex-wrap">
        <div class="flex-1 min-w-0"><span class="font-medium text-sm">\ud83c\udfe2 ${comp.name}</span>${selectedProd ? `<span class="text-xs text-green-400 ml-2">${formatConverted(selectedProd.price, selectedProd.currency)}</span>` : ''}</div>
        <select onchange="setQuoteSelection('${escQ(cat)}','${comp.id}',this.value)" class="bg-dark-600 border border-dark-500 rounded-lg px-3 py-1.5 text-sm min-w-[220px]">
          <option value="">\uc81c\ud488 \uc120\ud0dd</option>
          ${compProds.map(p => { const lbl = formatQuoteOption(p, cat).replace(/"/g, '&quot;'); return `<option value="${p.id}" ${p.id === selectedProdId ? 'selected' : ''}>${lbl}</option>` }).join('')}
        </select>`;
          if (selectedProd) {
            html += `<input type="number" min="1" value="${qty}" onchange="setQuoteQuantity('${selectedProd.id}',this.value)" class="bg-dark-600 border border-dark-500 rounded-lg px-2 py-1.5 text-sm w-16 text-center" title="\uc218\ub7c9">

          }
          html += `</div>`;
        });
        catSubtotals[cat] = catTotal;
        grandTotal += catTotal;
        // \uce74\ud14c\uace0\ub9ac \uc18c\uacc4
        if (catTotal > 0) {
          html += `<div class="text-right text-sm font-medium text-accent-light mt-1 pr-2">${cat} \uc18c\uacc4: ${formatPrice(catTotal, quoteDisplayCurrency)}</div>`;
        }
        html += `</div></div>`;
      });
      if (!html) html = '<p class="text-sm text-dark-400 text-center py-8">\ub4f1\ub85d\ub41c \uc81c\ud488\uc774 \uc5c6\uc2b5\ub2c8\ub2e4.</p>';
      container.innerHTML = html;

      // \ud569\uacc4 \ubc15\uc2a4

    function executeExcelExport() {
      const activeCols = excelColumns.filter(c => c.checked);
      const wb = XLSX.utils.book_new();
      if (excelExportMode === 'compare') {
        const rows = [activeCols.map(c => c.name)];
        excelExportData.forEach(p => {
          const row = [];
          activeCols.forEach(c => {
            if (c.key === 'price') row.push(p.price ? p.price + ' ' + p.currency : '-');
            else if (c.key === 'unit') row.push(p.unit || '-');
            else if (c.key === 'leadTime') row.push(p.leadTime || '-');
            else if (c.key.startsWith('spec_')) row.push((p.specValues && p.specValues[c.key.slice(5)]) || '-');
          });
          rows.push(row);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows); ws['!cols'] = activeCols.map(() => ({ wch: 18 }));
        XLSX.utils.book_append_sheet(wb, ws, '스펙비교');
        XLSX.writeFile(wb, `스펙비교_${currentCategory}_${new Date().toISOString().slice(0, 10)}.xlsx`);
      } else {
        // 카테고리별 그룹핑 엑셀 내보내기
        const cats = Object.keys(excelExportData);
        const aoa = [];
        const merges = [];
        const styles = {};
        let maxCols = 0;
        let grandTotal = 0;

        cats.forEach((cat, catIdx) => {
          const catSpecs = (data.specs[cat] || []).map(s => s.name);
          const totalCols = activeCols.length + catSpecs.length;
          if (totalCols > maxCols) maxCols = totalCols;

          // 카테고리 헤더 행
          const catHeaderRow = new Array(totalCols).fill('');
          catHeaderRow[0] = cat;
          const catRowIdx = aoa.length;
          aoa.push(catHeaderRow);
          if (totalCols > 1) { merges.push({ s: { r: catRowIdx, c: 0 }, e: { r: catRowIdx, c: totalCols - 1 } }) }
          // 스타일: 인디고 배경 + 흰색 굵은 텍스트
          for (let ci = 0; ci < totalCols; ci++) {
            const addr = XLSX.utils.encode_cell({ r: catRowIdx, c: ci });
            styles[addr] = { font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 }, fill: { fgColor: { rgb: '4F46E5' } }, alignment: { horizontal: 'center', vertical: 'center' } };
          }

          // 컬럼 헤더 행
          const colHeaderRow = [];
          activeCols.forEach(c => colHeaderRow.push(c.name));
          catSpecs.forEach(s => colHeaderRow.push(s));
          const colRowIdx = aoa.length;
          aoa.push(colHeaderRow);
          // 스타일: 회색 배경 + 굵은 텍스트
          for (let ci = 0; ci < totalCols; ci++) {
            const addr = XLSX.utils.encode_cell({ r: colRowIdx, c: ci });
            styles[addr] = { font: { bold: true }, fill: { fgColor: { rgb: 'D1D5DB' } }, alignment: { horizontal: 'center' } };
          }

          // 컴럼 헤더에 수량, 소계 추가
          colHeaderRow.push('수량', '소계(' + quoteDisplayCurrency + ')');
          const totalColsExt = totalCols + 2;
          if (totalColsExt > maxCols) maxCols = totalColsExt;
          // 카테고리 헤더 병합 수정
          if (merges.length) { merges[merges.length - 1].e.c = totalColsExt - 1 }

          let catSubtotal = 0;
          // 데이터 행
          excelExportData[cat].forEach(r => {
            const row = [];
            activeCols.forEach(c => {
              if (c.key === 'company') row.push(r.comp.name);
              else if (c.key === 'product') row.push(r.prod.name);
              else if (c.key === 'price') row.push(r.prod.price || '');
              else if (c.key === 'currency') row.push(r.prod.currency || '');
              else if (c.key === 'unit') row.push(r.prod.unit || '');
              else if (c.key === 'leadTime') row.push(r.prod.leadTime || '');
            });
            catSpecs.forEach(sn => { row.push((r.prod.specValues && r.prod.specValues[sn]) || '') });
            const qty = getQuoteQty(r.prod.id);
            const converted = convertPrice(r.prod.price, r.prod.currency, quoteDisplayCurrency);
            const sub = converted * qty;
            catSubtotal += sub;
            row.push(qty);
            row.push(Math.round(sub * 100) / 100);
            aoa.push(row);
          });

          // 카테고리 소계 행
          const subtotalRow = new Array(totalColsExt).fill('');
          subtotalRow[totalColsExt - 2] = cat + ' 소계';
          subtotalRow[totalColsExt - 1] = Math.round(catSubtotal * 100) / 100;
          const subRowIdx = aoa.length;
          aoa.push(subtotalRow);
          for (let ci = 0; ci < totalColsExt; ci++) {
            const addr = XLSX.utils.encode_cell({ r: subRowIdx, c: ci });
            styles[addr] = { font: { bold: true }, fill: { fgColor: { rgb: 'E0E7FF' } }, alignment: { horizontal: ci >= totalColsExt - 2 ? 'right' : 'left' } };
          }

          grandTotal += catSubtotal;

          // 카테고리 간 빈 행
          if (catIdx < cats.length - 1) {
            aoa.push(new Array(totalColsExt).fill(''));
          }
        });

        // 전체 합계 행
        aoa.push(new Array(maxCols).fill('')); // 빈 행
        const totalRow = new Array(maxCols).fill('');
        totalRow[maxCols - 2] = '전체 합계 (' + quoteDisplayCurrency + ')';
        totalRow[maxCols - 1] = Math.round(grandTotal * 100) / 100;
        const totalRowIdx = aoa.length;
        aoa.push(totalRow);
        for (let ci = 0; ci < maxCols; ci++) {
          const addr = XLSX.utils.encode_cell({ r: totalRowIdx, c: ci });
          styles[addr] = { font: { bold: true, sz: 12, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '4F46E5' } }, alignment: { horizontal: ci >= maxCols - 2 ? 'right' : 'center' } };
        }
        if (maxCols > 1) { merges.push({ s: { r: totalRowIdx, c: 0 }, e: { r: totalRowIdx, c: maxCols - 3 } }) }

        const ws = XLSX.utils.aoa_to_sheet(aoa);
        ws['!merges'] = merges;
        ws['!cols'] = Array.from({ length: maxCols }, () => ({ wch: 16 }));
        Object.entries(styles).forEach(([addr, style]) => {
          if (!ws[addr]) ws[addr] = { t: 's', v: '' };
          ws[addr].s = style;
        });
        XLSX.utils.book_append_sheet(wb, ws, '최종견적');
        XLSX.writeFile(wb, `최종견적_${new Date().toISOString().slice(0, 10)}.xlsx`);
      }
      closeModal('modalExcelPreview'); showToast('엑셀 다운로드 완료');
    }

    function downloadUploadTemplate() {

      const headers = ['카테고리', '회사명', '제품명', '가격', '통화(USD/KRW/CNY)', '단위', '리드타임'];

    let uploadParsedData = [];
    function handleExcelUpload(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(ws, { header: 1 });
          if (json.length < 2) { showToast('데이터가 없습니다'); return }
          const headers = json[0];
          const rows = json.slice(1).filter(r => r.some(c => c !== undefined && c !== ''));
          uploadParsedData = rows.map(row => {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = row[i] !== undefined ? String(row[i]) : '' });
            return obj;
          });
          // Preview
          const pv = document.getElementById('uploadPreview'); pv.classList.remove('hidden');
          let tbl = '<table class="preview-table"><thead><tr>';
          headers.forEach(h => { tbl += `<th>${h}</th>` });
          tbl += '</tr></thead><tbody>';
          uploadParsedData.slice(0, 20).forEach(row => {
            tbl += '<tr>'; headers.forEach(h => { tbl += `<td>${row[h] || ''}</td>` }); tbl += '</tr>';
          });
          tbl += '</tbody></table>';
          if (uploadParsedData.length > 20) tbl += `<p class="text-xs text-dark-400 mt-1">... 외 ${uploadParsedData.length - 20}건</p>`;
          document.getElementById('uploadPreviewTable').innerHTML = tbl;
          // Summary
          let newCount = 0, updateCount = 0;
          uploadParsedData.forEach(row => {
            const catKey = row['카테고리'] || ''; const compName = row['회사명'] || ''; const prodName = row['제품명'] || '';
            if (!catKey || !compName || !prodName) return;
            const comp = getCatCompanies(catKey).find(c => c.name === compName);
            if (!comp) { newCount++; return }
            const existing = data.products.find(p => p.companyId === comp.id && p.category === catKey && p.name === prodName);
            if (existing) {
              const specs = data.specs[catKey] || [];
              const specMatch = specs.every(s => { const sv = (existing.specValues && existing.specValues[s.name]) || ''; const rv = row[s.name] || ''; return sv === rv });
              if (specMatch) updateCount++; else newCount++;
            } else newCount++;
          });
          document.getElementById('uploadSummary').innerHTML = `<span class="text-green-400">신규 ${newCount}건</span> · <span class="text-yellow-400">업데이트 ${updateCount}건</span> · 총 ${uploadParsedData.length}건`;
        } catch (err) { showToast('파일 읽기 오류: ' + err.message) }
      };
      reader.readAsArrayBuffer(file);
    }
    function confirmExcelUpload() {
      let added = 0, updated = 0;
      uploadParsedData.forEach(row => {
        const catKey = row['카테고리'] || ''; const compName = row['회사명'] || ''; const prodName = row['제품명'] || '';
        if (!catKey || !compName || !prodName) return;
        // Ensure category exists
        if (!data.categories.includes(catKey)) { data.categories.push(catKey); data.specs[catKey] = []; data.companies[catKey] = [] }
        // Ensure company exists
        if (!data.companies[catKey]) data.companies[catKey] = [];
        let comp = data.companies[catKey].find(c => c.name === compName);
        if (!comp) { comp = { id: uid(), name: compName, country: '', memo: '' }; data.companies[catKey].push(comp) }
        // Gather spec values
        const specValues = {};
        const knownKeys = ['카테고리', '회사명', '제품명', '가격', '통화(USD/KRW/CNY)', '단위', '리드타임'];
        Object.keys(row).forEach(k => { if (!knownKeys.includes(k) && row[k]) specValues[k] = row[k] });
        // Check for spec items that need to be added to specs list
        Object.keys(specValues).forEach(sn => {
          if (!data.specs[catKey]) data.specs[catKey] = [];
          if (!data.specs[catKey].find(s => s.name === sn)) { data.specs[catKey].push({ name: sn, type: 'text' }) }
        });
        // Find existing
        const existing = data.products.find(p => p.companyId === comp.id && p.category === catKey && p.name === prodName);
        if (existing) {
          const specs = data.specs[catKey] || [];
          const specMatch = specs.every(s => { const sv = (existing.specValues && existing.specValues[s.name]) || ''; const rv = specValues[s.name] || ''; return sv === rv });
          if (specMatch) {
            // Update price, currency, unit, leadTime only
            existing.price = parseFloat(row['가격']) || existing.price;
            existing.currency = row['통화(USD/KRW/CNY)'] || existing.currency;
            existing.unit = row['단위'] || existing.unit;
            existing.leadTime = row['리드타임'] || existing.leadTime;
            updated++;
          } else {
            data.products.push({ id: uid(), companyId: comp.id, category: catKey, name: prodName, price: parseFloat(row['가격']) || 0, currency: row['통화(USD/KRW/CNY)'] || 'USD', unit: row['단위'] || '', leadTime: row['리드타임'] || '', specValues, memo: '' });
            added++;
          }
        } else {
          data.products.push({ id: uid(), companyId: comp.id, category: catKey, name: prodName, price: parseFloat(row['가격']) || 0, currency: row['통화(USD/KRW/CNY)'] || 'USD', unit: row['단위'] || '', leadTime: row['리드타임'] || '', specValues, memo: '' });
          added++;
        }
      });
      save(); closeModal('modalExcelUpload'); renderAll();
      showToast(`업로드 완료: 신규 ${added}건, 업데이트 ${updated}건`);
    }

      const groupCb = document.querySelector(`.cat-group-cb[data-catid="${catId}"]`);
      if (groupCb && cbs.length) {
        const allChecked = Array.from(cbs).every(cb => cb.checked);
        const someChecked = Array.from(cbs).some(cb => cb.checked);
        groupCb.checked = allChecked;
        groupCb.indeterminate = someChecked && !allChecked;
      }
    }

    function openCategoryExportModal() {
      const container = document.getElementById('categoryExportCheckboxes');
      if (!data.categories.length) {
        container.innerHTML = '<p class="text-sm text-dark-400 text-center py-4">등록된 카테고리가 없습니다.</p>';
      } else {
        let html = '';
        data.categories.forEach((cat, idx) => {
          const comps = data.companies[cat] || [];
          if (comps.length === 0) return;
          const catId = 'cat_exp_' + idx;
          html += `
          <div class="mb-2 bg-dark-700/50 rounded-lg border border-dark-600">
            <div class="cursor-pointer p-2 text-sm font-medium hover:bg-dark-600 transition-colors flex items-center gap-2 select-none" onclick="toggleExpGroup('${catId}', event)">
              <span class="text-xs text-dark-400 w-4 text-center toggle-icon" id="icon_${catId}">▶</span>
              <input type="checkbox" class="cat-group-cb accent-indigo-500 w-4 h-4" data-catid="${catId}" onchange="toggleCategoryGroup('${catId}', this.checked); event.stopPropagation();" onclick="event.stopPropagation();">
              <span class="text-dark-100 flex-1">${cat}</span>
            </div>
            <div id="content_${catId}" class="hidden p-2 pt-0 pl-10 space-y-1 border-t border-dark-600/50 mt-1">
              ${comps.map(c => `
                <label class="flex items-center gap-2 cursor-pointer p-1.5 rounded hover:bg-dark-600 transition-colors">
                  <input type="checkbox" value="${c.id}" data-cat="${escQ(cat)}" data-catid="${catId}" class="comp-export-cb accent-indigo-500 w-4 h-4" onchange="updateCatGroupStatus('${catId}')">
                  <span class="text-sm text-dark-200">${c.name}</span>
                </label>
              `).join('')}
            </div>
          </div>`;
        });
        if (!html) {
          html = '<p class="text-sm text-dark-400 text-center py-4">등록된 회사가 없습니다.</p>';
        }
        container.innerHTML = html;
        toggleAllCategoryExport(true);
      }
      openModal('modalCategoryExport');
    }

    function toggleAllCategoryExport(checked) {
      document.querySelectorAll('.comp-export-cb').forEach(cb => cb.checked = checked);
      document.querySelectorAll('.cat-group-cb').forEach(cb => {
        cb.checked = checked;
        cb.indeterminate = false;
      });
    }

    function executeCategoryExport() {
      const selectedComps = Array.from(document.querySelectorAll('.comp-export-cb:checked')).map(cb => ({
        compId: cb.value,
        cat: cb.getAttribute('data-cat')
      }));

      if (selectedComps.length === 0) {
        showToast('내보낼 회사를 선택하세요');
        return;
      }

      const exportProducts = [];
      selectedComps.forEach(sc => {
        const prods = data.products.filter(p => p.category === sc.cat && p.companyId === sc.compId);
        exportProducts.push(...prods);
      });

      if (exportProducts.length === 0) {
        showToast('선택한 회사의 제품이 없습니다');
        return;
      }

      const uniqueSpecs = new Set();
      selectedComps.forEach(sc => {
        const specs = data.specs[sc.cat] || [];
        specs.forEach(s => uniqueSpecs.add(s.name));
      });
      const specArray = Array.from(uniqueSpecs);

      const headers = ['카테고리', '회사명', '제품명', '가격', '통화(USD/KRW/CNY)', '단위', '리드타임', ...specArray];
      const rows = [headers];

      exportProducts.forEach(p => {
        const comp = getCompany(p.companyId);
        const row = [
          p.category,
          comp ? comp.name : '',
          p.name,
          p.price === 0 || p.price ? p.price : '',
          p.currency || '',
          p.unit || '',
          p.leadTime || ''
        ];
        specArray.forEach(sn => {
          row.push((p.specValues && p.specValues[sn]) || '');
        });
        rows.push(row);
      });

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = headers.map(() => ({ wch: 16 }));

      XLSX.utils.book_append_sheet(wb, ws, '제품목록');

      const fileName = `제품내보내기_${new Date().toISOString().slice(0, 10)}.xlsx`;
      XLSX.writeFile(wb, fileName);
      closeModal('modalCategoryExport');
      showToast('데이터 내보내기 완료');
    }

    /* ===================== SEARCH ===================== */
    let searchSelectedCategories = [];
    let searchSelectedCompanies = [];
    let searchResultProducts = [];

    function openSearchModal() {
      searchSelectedCategories = [];
      searchSelectedCompanies = [];
      searchResultProducts = [];
      document.getElementById('searchResultCount').textContent = '(0)';
      document.getElementById('searchResults').innerHTML = '<p class="text-xs text-dark-400 text-center py-6">검색 조건을 설정하고 검색 실행을 클릭하세요.</p>';
      document.getElementById('searchExportBtn').classList.add('hidden');

      renderSearchCategories();
      renderSearchCompanies();
      renderSearchSpecs();
      openModal('modalSearch');
    }

    function renderSearchCategories() {
      const container = document.getElementById('searchCategories');
      if (!data.categories.length) {
        container.innerHTML = '<span class="text-dark-400 text-xs">등록된 카테고리가 없습니다.</span>';
        return;
      }
      container.innerHTML = data.categories.map(cat => {
        const isChecked = searchSelectedCategories.includes(cat);
        return `<label class="flex items-center gap-1.5 cursor-pointer hover:bg-dark-600 px-2 py-1 rounded transition-colors bg-dark-600/50">
          <input type="checkbox" value="${escQ(cat)}" ${isChecked ? 'checked' : ''} class="accent-indigo-500 w-4 h-4" onchange="onSearchCategoryChange('${escQ(cat)}', this.checked)">
          <span>${cat}</span>
        </label>`;
      }).join('');
    }

    function searchToggleAllCat(check) {
      searchSelectedCategories = check ? [...data.categories] : [];
      renderSearchCategories();
      renderSearchCompanies();
      renderSearchSpecs();
    }

    function searchToggleAllComp(check) {
      if (check) {
        searchSelectedCompanies = [];
        searchSelectedCategories.forEach(cat => {
          const comps = getCatCompanies(cat);
          comps.forEach(c => { if (!searchSelectedCompanies.includes(c.id)) searchSelectedCompanies.push(c.id); });
        });
      } else {
        searchSelectedCompanies = [];
      }
      renderSearchCompanies();
    }

    function onSearchCategoryChange(cat, checked) {
      if (checked) {
        if (!searchSelectedCategories.includes(cat)) searchSelectedCategories.push(cat);
      } else {
        searchSelectedCategories = searchSelectedCategories.filter(c => c !== cat);
        const compIdsToRemove = getCatCompanies(cat).map(c => c.id);
        searchSelectedCompanies = searchSelectedCompanies.filter(cid => !compIdsToRemove.includes(cid));
      }
      renderSearchCompanies();
      renderSearchSpecs();
    }

    function renderSearchCompanies() {
      const container = document.getElementById('searchCompanies');
      if (!searchSelectedCategories.length) {
        container.innerHTML = '<span class="text-dark-400 text-xs text-center block w-full">카테고리를 먼저 선택하세요.</span>';
        return;
      }

      let allComps = [];
      searchSelectedCategories.forEach(cat => {
        const comps = getCatCompanies(cat);
        comps.forEach(c => {
          if (!allComps.find(x => x.id === c.id)) {
            allComps.push({ ...c, _cat: cat });
          }
        });
      });

      if (!allComps.length) {
        container.innerHTML = '<span class="text-dark-400 text-xs text-center block w-full">선택한 카테고리에 회사가 없습니다.</span>';
        return;
      }

      container.innerHTML = allComps.map(c => {
        const isChecked = searchSelectedCompanies.includes(c.id);
        return `<label class="flex items-center gap-1.5 cursor-pointer hover:bg-dark-600 px-2 py-1 rounded transition-colors bg-dark-600/50">
          <input type="checkbox" value="${c.id}" ${isChecked ? 'checked' : ''} class="accent-indigo-500 w-4 h-4" onchange="onSearchCompanyChange('${c.id}', this.checked)">
          <span class="truncate max-w-[120px]" title="${c.name}">${c.name}</span>
          <span class="text-[10px] text-dark-400 shrink-0">(${c._cat})</span>
        </label>`;
      }).join('');
    }

    function onSearchCompanyChange(compId, checked) {
      if (checked) {
        if (!searchSelectedCompanies.includes(compId)) searchSelectedCompanies.push(compId);
      } else {
        searchSelectedCompanies = searchSelectedCompanies.filter(id => id !== compId);
      }
    }

    function renderSearchSpecs() {
      const container = document.getElementById('searchSpecs');
      if (!searchSelectedCategories.length) {
        container.innerHTML = '<div class="col-span-full text-center text-dark-400 text-xs py-2">카테고리를 선택하면 스펙 항목이 표시됩니다.</div>';
        return;
      }

      let specSet = new Set();
      searchSelectedCategories.forEach(cat => {
        const specs = data.specs[cat] || [];
        specs.forEach(s => {
          specSet.add(s.name);
        });
      });

      const allSpecNames = Array.from(specSet);
      if (!allSpecNames.length) {
        container.innerHTML = '<div class="col-span-full text-center text-dark-400 text-xs py-2">선택한 카테고리에 스펙 항목이 없습니다.</div>';
        return;
      }

      container.innerHTML = allSpecNames.map(sn => {
        return `<div>
          <label class="text-xs text-dark-300 block mb-1 truncate" title="${sn}">${sn}</label>
          <input type="text" data-search-spec="${sn}" class="w-full bg-dark-800 border border-dark-500 rounded px-2 py-1.5 text-xs text-dark-100 placeholder-dark-500" placeholder="포함할 검색어 입력">
        </div>`;
      }).join('');
    }

    function executeSearch() {
      if (!searchSelectedCategories.length) {
        showToast('최소 한 개의 카테고리를 선택하세요.');
        return;
      }

      const specFilters = {};
      let hasAnySpecFilter = false;
      document.querySelectorAll('input[data-search-spec]').forEach(input => {
        const val = input.value.trim().toLowerCase();
        if (val) {
          specFilters[input.dataset.searchSpec] = val;
          hasAnySpecFilter = true;
        }
      });

      searchResultProducts = data.products.filter(p => {
        if (!searchSelectedCategories.includes(p.category)) return false;
        if (!searchSelectedCompanies.includes(p.companyId)) return false;

        // Spec checks - Must partially match ALL provided spec inputs for this product
        let specMatch = true;
        for (const [sn, filterText] of Object.entries(specFilters)) {
          const prodVal = p.specValues && p.specValues[sn] ? String(p.specValues[sn]).toLowerCase() : '';
          if (!prodVal.includes(filterText)) {
            specMatch = false;
            break;
          }
        }

        return specMatch;
      });

      renderSearchResults();
    }

    function renderSearchResults() {
      const container = document.getElementById('searchResults');
      const counter = document.getElementById('searchResultCount');
      const exportBtn = document.getElementById('searchExportBtn');

      counter.textContent = `(${searchResultProducts.length})`;

      if (!searchResultProducts.length) {
        container.innerHTML = '<p class="text-xs text-dark-400 text-center py-6">조건에 맞는 검색 결과가 없습니다. (회사 선택 여부도 확인해주세요)</p>';
        exportBtn.classList.add('hidden');
        return;
      }

      exportBtn.classList.remove('hidden');

      const resultSpecSet = new Set();
      searchResultProducts.forEach(p => {
        if (p.specValues) {
          Object.keys(p.specValues).forEach(k => resultSpecSet.add(k));
        }
      });
      const specColumns = Array.from(resultSpecSet);

      let html = `<table class="preview-table text-xs whitespace-nowrap min-w-full">
        <thead class="sticky top-0 z-10 bg-dark-600">
          <tr>
            <th class="w-8 text-center p-1"><input type="checkbox" checked onchange="toggleAllSearchResults(this.checked)" class="accent-indigo-500 w-3 h-3"></th>
            <th>카테고리</th>
            <th>회사명</th>
            <th>제품명</th>
            <th>가격</th>
            <th>단위</th>
            <th>리드타임</th>
            ${specColumns.map(s => `<th>${s}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
      `;

      searchResultProducts.forEach((p, idx) => {
        const comp = getCompany(p.companyId);
        html += `
          <tr class="hover:bg-dark-600/30">
            <td class="text-center p-1"><input type="checkbox" checked value="${p.id}" class="search-result-cb accent-indigo-500 w-3 h-3"></td>
            <td>${p.category}</td>
            <td class="truncate max-w-[100px]" title="${comp ? comp.name : '-'}">${comp ? comp.name : '-'}</td>
            <td class="font-medium text-dark-100 truncate max-w-[150px]" title="${p.name}">${p.name}</td>
            <td>${p.price ? p.price + ' ' + (p.currency || '') : '-'}</td>
            <td>${p.unit || '-'}</td>
            <td>${p.leadTime || '-'}</td>
            ${specColumns.map(s => {
          const v = (p.specValues && p.specValues[s]) || '';
          return `<td class="max-w-[150px] truncate" title="${v}">${v || '-'}</td>`;
        }).join('')}
          </tr>
        `;
      });
      html += `</tbody></table>`;
      container.innerHTML = html;
    }

    function toggleAllSearchResults(checked) {
      document.querySelectorAll('.search-result-cb').forEach(cb => cb.checked = checked);
    }

    function exportSearchToExcel() {
      const checkedBoxes = Array.from(document.querySelectorAll('.search-result-cb:checked'));
      if (!checkedBoxes.length) {
        showToast('내보낼 제품을 하나 이상 선택하세요.');
        return;
      }

      const selectedIds = checkedBoxes.map(cb => cb.value);
      const itemsToExport = searchResultProducts.filter(p => selectedIds.includes(p.id));

      const specSet = new Set();
      itemsToExport.forEach(p => {
        if (p.specValues) Object.keys(p.specValues).forEach(k => specSet.add(k));
      });
      const specArray = Array.from(specSet);

      const headers = ['카테고리', '회사명', '제품명', '가격', '통화(USD/KRW/CNY)', '단위', '리드타임', ...specArray];
      const rows = [headers];

      itemsToExport.forEach(p => {
        const comp = getCompany(p.companyId);
        const row = [
          p.category,
          comp ? comp.name : '',
          p.name,
          p.price === 0 || p.price ? p.price : '',
          p.currency || '',
          p.unit || '',
          p.leadTime || ''
        ];
        specArray.forEach(sn => {
          row.push((p.specValues && p.specValues[sn]) || '');
        });
        rows.push(row);
      });

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = headers.map(() => ({ wch: 16 }));

      XLSX.utils.book_append_sheet(wb, ws, '검색결과');
      const fileName = `검색다운로드_${new Date().toISOString().slice(0, 10)}.xlsx`;
      XLSX.writeFile(wb, fileName);
      showToast('검색 결과 엑셀 다운로드 완료');
    }

    /* ===================== JSON EXPORT/IMPORT ===================== */
    function exportJSON() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
      a.download = `가격비교_백업_${new Date().toISOString().slice(0, 10)}.json`; a.click();
      URL.revokeObjectURL(url); showToast('백업 다운로드 완료');
    }
    function importJSON(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (!imported.categories || !imported.specs) { showToast('유효하지 않은 파일'); return }
          if (!confirm('현재 데이터를 덮어쓰시겠습니까?')) return;
          data = imported;
          if (!data.companies) {
            data.companies = {};
            data.categories.forEach(cat => data.companies[cat] = []);
          }
          if (!data.products) data.products = [];
          if (!data.quoteSelections) data.quoteSelections = {};
          save(); currentCategory = data.categories[0] || ''; selectedCompanyId = null; selectedProductId = null;
          renderAll(); showToast('데이터 복원 완료');
        } catch (err) { showToast('JSON 파싱 오류') }
      };
      reader.readAsText(file); event.target.value = '';
    }

    /* ===================== INIT ===================== */
    function renderAll() {
      renderCategoryTabs(); switchSubTab(currentSubTab); renderCompanyTab(); renderCompareTab(); renderQuoteBuilder();
    }

    let _appLoaded = false;

    function updateHeaderUI() {
      const displayName = getUserDisplayName();
      document.getElementById('headerUsername').textContent = displayName;
      document.getElementById('headerUsername').classList.remove('hidden');
      // 어드민 버튼 표시/숨김
      const isAdmin = currentUserProfile.is_admin;
      document.getElementById('btnUserManage').classList.toggle('hidden', !isAdmin);
      document.getElementById('btnDeleteLogs').classList.toggle('hidden', !isAdmin);
      const divider = document.getElementById('adminDivider');
      if (divider) divider.style.display = isAdmin ? '' : 'none';
    }

    async function initAuth() {
      const safeLoadAndInitialize = async () => {
        try {
          await load();
        } catch (e) {
          console.error('[initAuth] 데이터 로드 실패. 초기값으로 폴백합니다.', e);
          initDefaultData();
          save();
        }
        await loadCurrentProfile();
        initModals(); loadQuoteSpecDisplay(); loadCompareSpecDisplay(); loadCompanySpecDisplay(); loadExchangeRates();
        currentCategory = data.categories[0] || '';
        updateHeaderUI();
        renderAll();
        _appLoaded = true;
      };

      // 1. 페이지 로드 시 세션 먼저 확인 후 화면 초기화
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appWrapper').style.display = 'block';
        if (session.user && session.user.email) {
          currentUserEmail = session.user.email;
          document.getElementById('headerUsername').textContent = session.user.email.split('@')[0];
          document.getElementById('headerUsername').classList.remove('hidden');
        }
        if (!_appLoaded) {
          await safeLoadAndInitialize();
        }
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appWrapper').style.display = 'none';
        document.getElementById('headerUsername').classList.add('hidden');
      }

      // 2. 이벤트 등록 (SIGNED_IN, SIGNED_OUT 명확히 분기)
      sb.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN') {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('appWrapper').style.display = 'block';
          if (session && session.user && session.user.email) {
            currentUserEmail = session.user.email;
            document.getElementById('headerUsername').textContent = session.user.email.split('@')[0];
            document.getElementById('headerUsername').classList.remove('hidden');
          }
          if (!_appLoaded) {
            await safeLoadAndInitialize();
          }
        } else if (event === 'SIGNED_OUT') {
          document.getElementById('loginScreen').style.display = 'flex';
          document.getElementById('appWrapper').style.display = 'none';
          document.getElementById('headerUsername').classList.add('hidden');
          document.getElementById('btnUserManage').classList.add('hidden');
          document.getElementById('btnDeleteLogs').classList.add('hidden');
          _appLoaded = false;
          currentUserProfile = { nickname: null, is_admin: false };
          currentUserEmail = '';
          data = { categories: [], specs: {}, companies: {}, products: [], quoteSelections: {} };
          if (window.syncTimeout) clearTimeout(window.syncTimeout);
        }
      });
    }

    initAuth();
  </script>
</body>
